name: Build Android TWA

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version code (integer, must increase each release)'
        required: true
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Pre-configure Bubblewrap (skip interactive JDK/SDK prompts)
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Validate Bubblewrap setup
        run: yes | bubblewrap doctor || true

      - name: Generate missing logo assets
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          cd assets/
          convert logo.png -resize 96x96 logo-96.png
          convert logo.png -resize 128x128 logo-128.png
          convert logo.png -resize 256x256 logo-256.png
          convert logo.png -resize 384x384 logo-384.png

      - name: Decode keystore
        run: |
          mkdir -p build
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ./keystore.jks
          cp ./keystore.jks ./build/keystore.jks
          # Also place at android.keystore so bubblewrap init finds it
          # and skips the interactive "create keystore" prompts
          cp ./keystore.jks ./android.keystore

      - name: Update twa-manifest.json for this build
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
            m.appVersionName = '${{ inputs.version_name }}';
            m.appVersionCode = parseInt('${{ inputs.version_code }}');
            m.signingKey.path = '${{ github.workspace }}/keystore.jks';
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
          "

      - name: Install expect (for handling interactive prompts)
        run: sudo apt-get install -y expect

      - name: Generate Android project
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Save our custom twa-manifest.json before init overwrites it
          cp twa-manifest.json /tmp/custom-twa-manifest.json

          # Use expect to handle interactive prompts from bubblewrap init.
          # Send Enter (accept defaults) for all prompts.
          expect << 'EXPECT_EOF'
          set timeout 300
          spawn bubblewrap init --manifest=https://resiq.hostizzy.com/manifest.json
          expect {
            -re "\\?" {
              send "\r"
              exp_continue
            }
            timeout {
              puts "Init completed or timed out"
            }
            eof
          }
          EXPECT_EOF

          # Restore our custom twa-manifest.json (with our package ID, version,
          # signing key, etc.) over the one init generated from web manifest
          cp /tmp/custom-twa-manifest.json twa-manifest.json

          # Verify the project was created
          if [ -f "gradlew" ]; then
            echo "Android project generated successfully"
            chmod +x gradlew
          else
            echo "ERROR: gradlew not found. Listing directory:"
            ls -la
            exit 1
          fi

      - name: Build signed AAB and APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BUILD_VERSION_NAME: ${{ inputs.version_name }}
          BUILD_VERSION_CODE: ${{ inputs.version_code }}
        run: |
          # Bubblewrap uses inquirer (interactive CLI) which doesn't work
          # with simple piped input. Use 'expect' to wait for each prompt
          # and send the correct response.
          expect << 'EXPECT_EOF'
          set timeout 600
          spawn bubblewrap build --skipPwaValidation
          expect {
            -re "Would you like to apply" {
              send "y\r"
              exp_continue
            }
            -re "versionName" {
              send "$env(BUILD_VERSION_NAME)\r"
              exp_continue
            }
            -re "versionCode" {
              send "$env(BUILD_VERSION_CODE)\r"
              exp_continue
            }
            timeout {
              puts "ERROR: Build timed out after 600s"
              exit 1
            }
            eof
          }
          lassign [wait] pid spawnid os_error_flag value
          exit $value
          EXPECT_EOF

      - name: List build outputs
        run: |
          echo "=== Build outputs ==="
          find . -name "*.aab" -o -name "*.apk" 2>/dev/null | head -20
          ls -lh *.aab *.apk 2>/dev/null || true
          ls -lh app/build/outputs/apk/release/ 2>/dev/null || true
          ls -lh app/build/outputs/bundle/release/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resiq-release-v${{ inputs.version_name }}
          path: |
            *.aab
            *.apk
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 90

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name }}
          name: ResIQ v${{ inputs.version_name }}
          body: |
            ## ResIQ by Hostizzy v${{ inputs.version_name }}

            **Version Code:** ${{ inputs.version_code }}

            ### Artifacts
            - `app-release-bundle.aab` — Upload to Google Play Console
            - `app-release-signed.apk` — For direct device testing

            ### Play Store Upload
            1. Go to [Google Play Console](https://play.google.com/console)
            2. Select your app > Release > Production
            3. Create new release > Upload the `.aab` file
            4. Add release notes > Review and roll out
          files: |
            *.aab
            *.apk
          draft: false
          prerelease: false
